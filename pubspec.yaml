name: castcircle
description: "CastCircle - Help actors learn their lines"
publish_to: 'none'
version: 0.1.0+55

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # File handling
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.1.4

  # Audio
  just_audio: ^0.9.43
  record: ^5.2.1

  # PDF rendering (for OCR pipeline)
  pdfrx: ^2.2.24

  # OCR (on-device)
  google_mlkit_text_recognition: ^0.14.0

  # TTS (system fallback when Kokoro MLX unavailable)
  flutter_tts: ^4.2.0

  # Speech to text (Apple SFSpeechRecognizer, primary STT engine)
  speech_to_text: ^7.0.0

  # Backend
  supabase_flutter: ^2.8.2

  # Persistent preferences
  shared_preferences: ^2.3.4

  # Connectivity
  connectivity_plus: ^6.1.0

  # Deep links
  app_links: ^6.3.3
  qr_flutter: ^4.1.0

  # Contacts — using native platform channel (flutter_contacts crashes on iOS 26 beta)

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  archive: ^4.0.9
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3
  firebase_performance: ^0.11.1+5
  package_info_plus: ^9.0.0
  wakelock_plus: ^1.5.1
  simple_spell_checker: ^1.3.1
  simple_spell_checker_en_lan: ^1.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/
